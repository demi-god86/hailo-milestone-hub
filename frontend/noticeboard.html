<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><link rel="icon" type="image/svg+xml" href="/favicon.svg"/><title>Hailo - Comms Noticeboard</title><style>*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100vh;background:#0A1628;font-family:Arial,sans-serif;color:#fff}body{display:flex;flex-direction:column;align-items:center}.hero{width:100%;max-width:700px;padding:3rem 2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem;position:relative;overflow:hidden}.hero-glow{position:absolute;width:600px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(30,111,255,0.22) 0%,transparent 65%);top:-150px;left:50%;transform:translateX(-50%);pointer-events:none}.hero-logo{height:42px;width:auto;position:relative;z-index:2}.hero-title{font-size:34px;font-weight:900;color:#fff;text-align:center;line-height:1.2;position:relative;z-index:2}.hero-title span{color:#4DA3FF;display:block}.hero-sub{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.7;max-width:420px;position:relative;z-index:2}.divider{width:50px;height:3px;background:#1E6FFF;border-radius:2px}.lbl{width:100%;max-width:700px;padding:0 2rem 0.75rem;font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2.5px}.list{width:100%;max-width:700px;padding:0 2rem 4rem;display:flex;flex-direction:column}.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.15s}.card.open{border-color:rgba(77,163,255,0.3)}.hdr{display:flex;align-items:stretch;cursor:pointer;transition:background 0.15s;user-select:none}.hdr:hover{background:rgba(30,111,255,0.06)}.ds{background:rgba(30,111,255,0.2);border-right:1px solid rgba(77,163,255,0.25);padding:0 14px;min-width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}.ds-d{font-size:22px;font-weight:900;color:#fff;line-height:1;font-family:"Arial Black",Arial}.ds-m{font-size:10px;color:#4DA3FF;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}.ds-y{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:1px}.hdr-c{display:flex;align-items:center;gap:1rem;flex:1;padding:1rem 1.25rem}.hdr-icon{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(30,111,255,0.15);border:1px solid rgba(77,163,255,0.3);font-size:18px}.hdr-t{flex:1;min-width:0}.hdr-type{font-size:16px;font-weight:700;color:#fff}.hdr-sub{font-size:12px;color:rgba(255,255,255,0.3);margin-top:2px}.chev{font-size:11px;color:rgba(255,255,255,0.25);padding-right:1.25rem;flex-shrink:0;transition:transform 0.2s}.chev.open{transform:rotate(180deg);color:rgba(77,163,255,0.6)}.tray{display:none;border-top:1px solid rgba(255,255,255,0.06)}.tray.open{display:block}.entry{display:flex;align-items:center;gap:1rem;padding:0.85rem 1.25rem 0.85rem 88px;border-bottom:1px solid rgba(255,255,255,0.04)}.entry:last-child{border-bottom:none}.entry-title{flex:1;font-size:14px;font-weight:600;color:rgba(255,255,255,0.85)}.pdf-btn{padding:7px 16px;border-radius:50px;background:#1E6FFF;border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:Arial,sans-serif;text-decoration:none;display:inline-block;box-shadow:0 0 10px rgba(30,111,255,0.3);transition:box-shadow 0.15s,transform 0.1s;white-space:nowrap}.pdf-btn:hover{box-shadow:0 0 20px rgba(30,111,255,0.6);transform:scale(1.04)}.empty{text-align:center;color:rgba(255,255,255,0.25);font-size:14px;padding:3rem}.footer{font-size:12px;color:rgba(255,255,255,0.15);padding:2rem}.footer a{color:rgba(255,255,255,0.2);text-decoration:none}</style></head><body><div class="hero"><div class="hero-glow"></div><img src="/logo.png" class="hero-logo" alt="HAILO"/><div class="hero-title">Comms<span>Noticeboard</span></div><div class="hero-sub">All customer communications in one place.</div><div class="divider"></div></div><div class="lbl">Communications</div><div class="list" id="list"><div class="empty">Loading...</div></div><div class="footer">Homesearch &middot; Internal only &middot; <a href="index.html">Back to Hub</a></div><script>var CF="https://hailo-milestone.demi-048.workers.dev/data",_o={};async function load(){try{var r=await fetch(CF),d=await r.json(),gs=(d.commsGroups||[]).sort((a,b)=>new Date(b.date)-new Date(a.date)),el=document.getElementById("list");if(!gs.length){el.innerHTML="<div class='empty'>No communications yet.</div>";return;}el.innerHTML="";gs.forEach(g=>{var en=g.entries||[],dt=new Date(g.date),io=!!_o[g.id],c=document.createElement("div");c.className="card"+(io?" open":"");c.innerHTML="<div class='hdr' onclick='tog(\""+g.id+"\")'>  <div class='ds'><div class='ds-d'>"+dt.getDate()+"</div><div class='ds-m'>"+dt.toLocaleDateString("en-GB",{month:"short"})+"</div><div class='ds-y'>"+dt.getFullYear()+"</div></div><div class='hdr-c'><div class='hdr-icon'>&#128240;</div><div class='hdr-t'><div class='hdr-type'>"+esc(g.type)+"</div><div class='hdr-sub'>"+en.length+" document"+(en.length!==1?"s":"")+"</div></div></div><div class='chev"+(io?" open":"")+"'  id='ch-"+g.id+"'>&#9660;</div></div><div class='tray"+(io?" open":"")+"'  id='tr-"+g.id+"'>" +en.map(e=>"<div class='entry'><div class='entry-title'>"+esc(e.title)+"</div>"+(e.url?"<a class='pdf-btn' href='"+esc(e.url)+"' target='_blank' rel='noopener'>View PDF</a>":"")+"</div>").join("")+"</div>";el.appendChild(c);});}catch(e){document.getElementById("list").innerHTML="<div class='empty'>Could not load.</div>";}}function tog(id){_o[id]=!_o[id];document.getElementById("tr-"+id).classList.toggle("open",_o[id]);document.getElementById("ch-"+id).classList.toggle("open",_o[id]);document.querySelector("[onclick='tog(\""+id+"\")'").closest(".card").classList.toggle("open",_o[id]);}function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}load();</script></body></html>
