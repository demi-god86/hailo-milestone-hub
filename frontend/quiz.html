<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hailo Quiz — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:        #1A2B45;
    --navy-mid:    #223356;
    --navy-light:  #2A3F60;
    --purple:      #6B4FBB;
    --purple-light:#EDE8F9;
    --accent:      #F5A623;
    --correct:     #1A8A4A;
    --correct-bg:  #E8F7EE;
    --danger:      #C0392B;
    --danger-bg:   #FDEDEB;
    --text:        #1A2B45;
    --muted:       #6B7A8D;
    --border:      #DDE2EB;
    --white:       #FFFFFF;
    --surface:     #F7F8FB;
    --mid-grey:    #EEF0F4;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--navy);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-h { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .logo-h span { color: var(--accent); }
  .logo-badge {
    background: var(--purple);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .admin-pill {
    background: var(--accent);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
  }

  /* ── LAYOUT ── */
  .main { max-width: 1000px; margin: 0 auto; padding: 36px 24px 80px; }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--white);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 28px;
    box-shadow: 0 1px 8px rgba(26,43,69,0.07);
    flex-wrap: wrap;
    gap: 12px;
  }
  .status-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .dot-green { background: var(--correct); }
  .dot-amber { background: var(--accent); }
  .dot-grey  { background: var(--muted); }
  .save-btn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 3px 10px rgba(107,79,187,0.3);
  }
  .save-btn:hover { background: #5940a8; box-shadow: 0 4px 14px rgba(107,79,187,0.4); }
  .save-btn:active { transform: scale(0.97); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .count-badge {
    background: var(--purple-light);
    color: var(--purple);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .add-btn {
    background: var(--correct);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-btn:hover { background: #16773f; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }
  .filter-btn:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

  /* ── QUESTION CARDS ── */
  .questions-list { display: flex; flex-direction: column; gap: 12px; }

  .q-card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 1px 8px rgba(26,43,69,0.07);
    overflow: hidden;
    border: 1.5px solid var(--border);
    transition: border-color 0.15s;
  }
  .q-card.inactive { opacity: 0.55; }
  .q-card.inactive .q-card-header { background: var(--mid-grey); }

  .q-card-header {
    background: var(--navy);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .q-num {
    background: var(--purple);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .q-card.inactive .q-num { background: var(--muted); }
  .q-preview {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .q-card.inactive .q-preview { color: var(--muted); }
  .q-category-tag {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .q-card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 6px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    color: #fff;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.25); }
  .icon-btn.danger:hover { background: rgba(192,57,43,0.5); }
  .chevron {
    transition: transform 0.2s;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }
  .q-card.expanded .chevron { transform: rotate(180deg); }

  /* ── CARD BODY (edit form) ── */
  .q-card-body {
    display: none;
    padding: 20px 20px 24px;
    border-top: 1px solid var(--border);
  }
  .q-card.expanded .q-card-body { display: block; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .form-label .correct-mark {
    color: var(--correct);
    margin-left: 4px;
  }
  .form-input, .form-select, .form-textarea {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--purple);
    background: #fff;
  }
  .form-textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .explanation-textarea { min-height: 100px; }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .answer-field {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    transition: border-color 0.15s;
  }
  .answer-field:focus-within { border-color: var(--purple); background: #fff; }
  .answer-field.is-correct { border-color: var(--correct); background: var(--correct-bg); }
  .answer-letter-tag {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    flex-shrink: 0;
  }
  .answer-field.is-correct .answer-letter-tag {
    background: var(--correct);
    color: #fff;
  }
  .answer-input {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    flex: 1;
    min-width: 0;
  }

  .correct-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .correct-selector-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .correct-option {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }
  .correct-option input[type="radio"] { accent-color: var(--correct); cursor: pointer; }
  .correct-option span {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 22px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--correct); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
  .toggle-label { font-size: 13px; font-weight: 600; color: var(--muted); }

  .delete-btn {
    background: none;
    border: 1.5px solid var(--danger);
    color: var(--danger);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: var(--danger-bg); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--navy); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--navy);
    color: #fff;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(26,43,69,0.25);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 4px solid var(--correct); }
  .toast.error   { border-left: 4px solid var(--danger); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,43,69,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    max-width: 540px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(26,43,69,0.25);
    animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-header {
    background: var(--navy);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: #fff; }
  .modal-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: rgba(255,255,255,0.2); }
  .modal-body { padding: 24px; }
  .modal-body p { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 0 24px 24px; }
  .btn-cancel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
  }
  .btn-cancel:hover { background: var(--border); }
  .btn-confirm-delete {
    background: var(--danger);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
  }
  .btn-confirm-delete:hover { background: #a93226; }

  @media (max-width: 640px) {
    .topbar { padding: 12px 16px; }
    .main { padding: 20px 14px 60px; }
    .form-grid { grid-template-columns: 1fr; }
    .answers-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-h">H<span>.</span></div>
    <span style="color:rgba(255,255,255,0.4);font-size:20px;margin:0 2px">|</span>
    <span style="color:white;font-size:14px;font-weight:600">Homesearch</span>
    <div class="logo-badge">Hailo</div>
  </div>
  <div class="admin-pill">⚙ Quiz Admin</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-left">
      <div class="stat-chip"><div class="dot dot-green"></div><span id="stat-total">0 questions</span></div>
      <div class="stat-chip"><div class="dot dot-green"></div><span id="stat-active">0 active</span></div>
      <div class="stat-chip"><div class="dot dot-grey"></div><span id="stat-inactive">0 inactive</span></div>
      <div class="stat-chip" id="save-status"><div class="dot dot-amber"></div><span>Unsaved changes</span></div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveAll()">💾 Save to Cloudflare</button>
  </div>

  <!-- SECTION HEADER -->
  <div class="section-header">
    <div class="section-title">
      Basic Quiz Questions
      <span class="count-badge" id="count-badge">0</span>
    </div>
    <button class="add-btn" onclick="addQuestion()">+ Add Question</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('What Hailo Is', this)">What Hailo Is</button>
    <button class="filter-btn" onclick="setFilter('Pricing, Trial & Sign-Up', this)">Pricing & Sign-Up</button>
    <button class="filter-btn" onclick="setFilter('Scale & Growth', this)">Scale & Growth</button>
    <button class="filter-btn" onclick="setFilter('The Referral Scheme', this)">Referral Scheme</button>
    <button class="filter-btn" onclick="setFilter('Hailo in the Homesearch Suite', this)">Homesearch Suite</button>
  </div>

  <!-- QUESTIONS LIST -->
  <div class="questions-list" id="questions-list">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <h3>Loading questions...</h3>
      <p>Fetching from Cloudflare KV</p>
    </div>
  </div>

</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Delete Question</div>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p>Are you sure you want to delete this question? This cannot be undone until you save.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Delete Question</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://hailo-milestone.demi-048.workers.dev';
const CATEGORIES = [
  'What Hailo Is',
  'Pricing, Trial & Sign-Up',
  'Scale & Growth',
  'The Referral Scheme',
  'Hailo in the Homesearch Suite'
];

let questions = [];
let currentFilter = 'all';
let deleteTarget = null;
let hasUnsaved = false;

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadQuestions);

async function loadQuestions() {
  try {
    const res = await fetch(`${WORKER}/quiz-questions`);
    if (!res.ok) throw new Error('Failed to fetch');
    questions = await res.json();
    if (!questions.length) seedDefaultQuestions();
    render();
    updateStats();
    setUnsaved(false);
  } catch (e) {
    showToast('Could not load from Cloudflare. Using local seed.', 'error');
    seedDefaultQuestions();
    render();
    updateStats();
  }
}

// ── SEED DEFAULT QUESTIONS ───────────────────────────────────
function seedDefaultQuestions() {
  questions = [
  { id: uid(), active: true, category: 'What Hailo Is', question: 'What does the acronym HAILO stand for?', answers: ['Home Agency Intelligence Listings Online','Homesearch AI Listings Optimiser','Home Automated Indexing Listings Output','Homesearch Agent Intelligence Lead Optimiser'], correct: 1, explanation: "HAILO stands for Homesearch AI Listings Optimiser. The name matters because it tells you exactly what the product does. When talking to a customer, you can explain it simply: 'It's a product from Homesearch that increases the visibility of your listings and agency details when buyers search on tools like ChatGPT or Google Gemini.'" },
  { id: uid(), active: true, category: 'What Hailo Is', question: 'In plain English, what problem does Hailo solve for estate agents?', answers: ['It replaces the need for Rightmove and Zoopla','It increases the visibility of agent listings and contact details when buyers search on AI search platforms like ChatGPT and Google AI mode','It automates property descriptions using AI','It tracks how many leads come from social media'], correct: 1, explanation: "The core problem Hailo solves is visibility. More and more buyers are using AI tools like ChatGPT, Google Gemini, Perplexity and Copilot to search for property — and without Hailo, most agents have zero direct presence on those platforms. Hailo makes sure listings appear AND that the agent's contact details are clearly shown, so enquiries come back to the agent rather than disappearing into a portal." },
  { id: uid(), active: true, category: 'What Hailo Is', question: 'Is Hailo a portal?', answers: ['Yes — it is a new consumer-facing property portal','Yes — it replaces Rightmove for agents who sign up','No — it works in the background to make listings discoverable in AI search without competing with portals','No — it is a social media marketing tool'], correct: 2, explanation: "This is one of the most important things to be clear on. Hailo is NOT a traditional portal. It doesn't compete with agents' listings, doesn't sit between the agent and their customer, and doesn't try to attract consumers to browse a website. It works entirely in the background, optimising listings so they surface correctly when AI platforms like ChatGPT or Perplexity retrieve property information." },
  { id: uid(), active: true, category: 'What Hailo Is', question: "Which AI platforms does Hailo target for listing visibility?", answers: ['Only ChatGPT','Only Google and Bing','ChatGPT, Google Gemini, Perplexity, Copilot and Claude + More','Facebook, Instagram and TikTok'], correct: 2, explanation: "Hailo targets the major AI search platforms. This matters because each platform retrieves information differently: some rely on Bing or Google, while Perplexity uses its own crawler. Hailo works across all of them, meaning agents get visibility wherever buyers happen to be searching." },

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('questions-list');
  const filtered = currentFilter === 'all' ? questions : questions.filter(q => q.category === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No questions here</h3><p>Add a new question or change the filter above.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map((q, visIdx) => {
    const realIdx = questions.indexOf(q);
    return `
    <div class="q-card ${q.active ? '' : 'inactive'}" id="card-${q.id}">
      <div class="q-card-header" onclick="toggleCard('${q.id}')">
        <div class="q-num">${visIdx + 1}</div>
        <div class="q-preview">${q.question || 'New question'}</div>
        <div class="q-category-tag">${q.category}</div>
        <div class="q-card-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" title="Move up" onclick="moveUp(${realIdx})">↑</button>
          <button class="icon-btn" title="Move down" onclick="moveDown(${realIdx})">↓</button>
          <button class="icon-btn danger" title="Delete" onclick="openDeleteModal(${realIdx})">🗑</button>
        </div>
        <div class="chevron">▼</div>
      </div>
      <div class="q-card-body">
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Question</label>
            <textarea class="form-textarea" rows="2" onchange="updateField('${q.id}','question',this.value)">${esc(q.question)}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" onchange="updateField('${q.id}','category',this.value)">
              ${CATEGORIES.map(c => `<option value="${c}" ${q.category===c?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="form-label" style="margin-bottom:8px">Answer Options <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(select the correct one)</span></div>
        <div class="answers-grid">
          ${['A','B','C','D'].map((letter, i) => `
            <div class="answer-field ${q.correct === i ? 'is-correct' : ''}" id="af-${q.id}-${i}">
              <div class="answer-letter-tag">${letter}</div>
              <input class="answer-input" type="text" value="${esc(q.answers[i]||'')}"
                onchange="updateAnswer('${q.id}',${i},this.value)"
                placeholder="Answer ${letter}">
            </div>
          `).join('')}
        </div>

        <div class="correct-selector">
          <span class="correct-selector-label">Correct answer:</span>
          ${['A','B','C','D'].map((letter, i) => `
            <label class="correct-option">
              <input type="radio" name="correct-${q.id}" value="${i}" ${q.correct===i?'checked':''} onchange="setCorrect('${q.id}',${i})">
              <span>${letter}</span>
            </label>
          `).join('')}
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Explanation / Tip (shown after correct answer)</label>
          <textarea class="form-textarea explanation-textarea" onchange="updateField('${q.id}','explanation',this.value)">${esc(q.explanation)}</textarea>
        </div>

        <div class="card-footer">
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" ${q.active?'checked':''} onchange="toggleActive('${q.id}',this.checked)">
              <div class="toggle-slider"></div>
            </label>
            <span class="toggle-label">${q.active ? 'Active — shown in quiz' : 'Inactive — hidden from quiz'}</span>
          </div>
          <button class="delete-btn" onclick="openDeleteModal(${realIdx})">Delete Question</button>
        </div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

// ── HELPERS ───────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,10); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updateField(id, field, val) {
  const q = questions.find(q => q.id === id);
  if (q) { q[field] = val; setUnsaved(true); updateStats(); }
  if (field === 'question') {
    const card = document.getElementById(`card-${id}`);
    if (card) card.querySelector('.q-preview').textContent = val || 'New question';
  }
  if (field === 'category') {
    const card = document.getElementById(`card-${id}`);
    if (card) card.querySelector('.q-category-tag').textContent = val;
  }
  if (field === 'active') {
    const card = document.getElementById(`card-${id}`);
    if (card) card.querySelector('.toggle-label').textContent = val ? 'Active — shown in quiz' : 'Inactive — hidden from quiz';
  }
}

function updateAnswer(id, idx, val) {
  const q = questions.find(q => q.id === id);
  if (q) { q.answers[idx] = val; setUnsaved(true); }
}

function setCorrect(id, idx) {
  const q = questions.find(q => q.id === id);
  if (!q) return;
  q.correct = idx;
  setUnsaved(true);
  // update field highlights
  ['A','B','C','D'].forEach((_,i) => {
    const af = document.getElementById(`af-${id}-${i}`);
    if (af) af.classList.toggle('is-correct', i === idx);
    const tag = af?.querySelector('.answer-letter-tag');
    // handled by CSS
  });
}

function toggleActive(id, val) {
  const q = questions.find(q => q.id === id);
  if (!q) return;
  q.active = val;
  setUnsaved(true);
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.toggle('inactive', !val);
    card.querySelector('.toggle-label').textContent = val ? 'Active — shown in quiz' : 'Inactive — hidden from quiz';
  }
  updateStats();
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.toggle('expanded');
}

function addQuestion() {
  const q = {
    id: uid(), active: true,
    category: currentFilter !== 'all' ? currentFilter : CATEGORIES[0],
    question: '', answers: ['','','',''], correct: 0, explanation: ''
  };
  questions.unshift(q);
  setUnsaved(true);
  render();
  // auto-expand new card
  const card = document.getElementById(`card-${q.id}`);
  if (card) { card.classList.add('expanded'); card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
}

function moveUp(idx) {
  if (idx <= 0) return;
  [questions[idx-1], questions[idx]] = [questions[idx], questions[idx-1]];
  setUnsaved(true); render();
}

function moveDown(idx) {
  if (idx >= questions.length - 1) return;
  [questions[idx], questions[idx+1]] = [questions[idx+1], questions[idx]];
  setUnsaved(true); render();
}

// ── DELETE ────────────────────────────────────────────────────
function openDeleteModal(idx) {
  deleteTarget = idx;
  document.getElementById('delete-modal').classList.add('show');
}
function closeDeleteModal() {
  deleteTarget = null;
  document.getElementById('delete-modal').classList.remove('show');
}
function confirmDelete() {
  if (deleteTarget === null) return;
  questions.splice(deleteTarget, 1);
  deleteTarget = null;
  closeDeleteModal();
  setUnsaved(true);
  render();
}

// ── FILTER ────────────────────────────────────────────────────
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  const total = questions.length;
  const active = questions.filter(q => q.active).length;
  const inactive = total - active;
  document.getElementById('stat-total').textContent = `${total} question${total!==1?'s':''}`;
  document.getElementById('stat-active').textContent = `${active} active`;
  document.getElementById('stat-inactive').textContent = `${inactive} inactive`;
  document.getElementById('count-badge').textContent = total;
}

function setUnsaved(val) {
  hasUnsaved = val;
  const chip = document.getElementById('save-status');
  if (!val) {
    chip.innerHTML = '<div class="dot dot-green"></div><span>All saved</span>';
  } else {
    chip.innerHTML = '<div class="dot dot-amber"></div><span>Unsaved changes</span>';
  }
}

// ── SAVE ──────────────────────────────────────────────────────
async function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    const res = await fetch(`${WORKER}/quiz-questions`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(questions)
    });
    if (!res.ok) throw new Error('Save failed');
    setUnsaved(false);
    showToast('✓ Questions saved to Cloudflare', 'success');
  } catch (e) {
    showToast('✗ Save failed — check your Worker is running', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Save to Cloudflare';
  }
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// warn before leaving with unsaved changes
window.addEventListener('beforeunload', e => {
  if (hasUnsaved) { e.preventDefault(); e.returnValue = ''; }
});
</script>
